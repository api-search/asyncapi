name: APIs.io AsyncAPI
description: Browse AsyncAPI event specifications across the APIs.io network.
image: https://apis.io/assets/branding/apisio-social-card.png
url: https://asyncapi.apis.io

node: website
nav_active: more

keywords:
  - APIs
  - Search
  - Discovery

exclude: [".rvmrc", ".rbenv-version", "README.md", "Rakefile", "changelog.md", "scripts"]
include: [".well-known"]

github_org: api-search
github_repo: asyncapi

collections:
  asyncapis:
    output: true
    permalink: /asyncapis/:path/

defaults:
  - scope:
      path: ""
      type: asyncapis
    values:
      layout: asyncapi
